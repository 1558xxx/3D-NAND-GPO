data:
  csv_path: ../Data/nand_regression.csv
  feature_columns: ["步长", "WL", "Retention", "PEC"]
  target_column: "频数"
  features: 4
  target_dim: 1
  batch_size: 32
  scale: true
  seed: 42
  split:
    train: 0.7
    val: 0.15
    test: 0.15
  artifacts_dir: ./artifacts
  retention_scaler_path: ./artifacts/retention_scaler.pkl
  pec_scaler_path: ./artifacts/pec_scaler.pkl
  wl_vocab_path: ./artifacts/wl_vocab.json
  processed_csv_path: ./artifacts/processed_conditions.csv

model:
  type: MLP
  hidden_dims: [64, 32]
  in_dim: 4
  out_dim: 1
  num_nodes: 1

train:
  epochs: 200
  lr: 0.0001
  print_every: 10
  checkpoint_path: ./artifacts/mlp_regressor.pt
  parameter_vector_path: ./artifacts/mlp_regressor_params.npy
  metrics_path: ./artifacts/train_metrics.json
